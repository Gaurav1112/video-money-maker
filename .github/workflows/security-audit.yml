name: Security Audit

# Runs on every PR and weekly on main.
# Tools: actionlint (GHA linting), gitleaks (secret scanning), trivy (vuln scan).
# All tools are OSS and zero-cost — no SaaS tokens required.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly on Monday 7 AM IST (01:30 UTC)
    - cron: '30 1 * * 1'
  workflow_dispatch:

# Least-privilege: audit workflow only needs to read code and write
# security findings (SARIF upload requires security-events: write).
permissions:
  contents: read
  security-events: write   # for SARIF upload to GitHub Security tab
  pull-requests: write     # for inline PR annotations

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true  # OK to cancel older audit runs

jobs:
  # ── 1. actionlint — Static analysis of GHA workflow YAML ─────────────────
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned: actions/checkout v4.2.2
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Download actionlint
        env:
          ACTIONLINT_VERSION: "1.7.7"
        run: |
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz actionlint
          chmod +x actionlint
          ./actionlint --version

      - name: Run actionlint
        # Non-fatal during incremental hardening. The render-and-publish.yml
        # render-job outputs were declared in fix/c3 (see commit log).
        # Tracking remaining lints in MASTER-GAP-LIST.md Tier C — flip this
        # to fail-fast once all are clean.
        continue-on-error: true
        env:
          # Suppress info-level shellcheck checks that produce noise on the
          # legacy upload-scheduled.yml — these are non-blocking style hints.
          SHELLCHECK_OPTS: "-e SC2086 -e SC2012 -e SC2034"
        run: |
          # -format sarif not yet available in actionlint; use default output
          ./actionlint -color -ignore 'SC2086' -ignore 'SC2012' -ignore 'SC2034' .github/workflows/*.yml

  # ── 2. gitleaks — Secret / credential scanning ───────────────────────────
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned: actions/checkout v4.2.2
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0   # full history — gitleaks scans all commits

      - name: Download gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Run gitleaks (full history)
        run: |
          ./gitleaks detect \
            --source . \
            --log-opts "HEAD" \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            --exit-code 1

      # Upload SARIF to GitHub Security tab (visible in repo → Security → Code scanning)
      - name: Upload gitleaks SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-sarif
          path: gitleaks-report.sarif
          retention-days: 30

  # ── 3. trivy — Vulnerability scan (npm deps + secrets in files) ──────────
  trivy:
    name: trivy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # SHA-pinned: actions/checkout v4.2.2
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Install trivy
        env:
          TRIVY_VERSION: "0.70.0"
        run: |
          curl -fsSL \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xz trivy
          chmod +x trivy
          ./trivy --version

      - name: Scan npm dependencies (CRITICAL + HIGH)
        run: |
          ./trivy fs . \
            --scanners vuln \
            --pkg-types library \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output trivy-deps.sarif \
            --exit-code 1 \
            --ignore-unfixed

      - name: Scan for secrets in repo files
        run: |
          ./trivy fs . \
            --scanners secret \
            --format sarif \
            --output trivy-secrets.sarif \
            --exit-code 1

      - name: Upload trivy SARIF (deps)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-deps-sarif
          path: trivy-deps.sarif
          retention-days: 30

      - name: Upload trivy SARIF (secrets)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-secrets-sarif
          path: trivy-secrets.sarif
          retention-days: 30

  # ── 4. workflow-security-tests — Node.js assertions on workflow YAML ──────
  workflow-tests:
    name: workflow security tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned: actions/checkout v4.2.2
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      # SHA-pinned: actions/setup-node v4.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run workflow security tests
        run: npx vitest run tests/workflow-security.test.ts
