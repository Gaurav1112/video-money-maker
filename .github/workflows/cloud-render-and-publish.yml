name: Cloud Render & Publish

# Renders videos on GitHub Actions (cloud, no local machine needed)
# and uploads directly to YouTube.
# Videos are stored as GitHub Artifacts for backup.

on:
  # schedule: DISABLED -- use upload-scheduled.yml instead
    # 2 long-form + 6 shorts per week = 8 uploads, channel active daily
    # Long-form: Tue + Sat at 6:15 PM IST (12:45 UTC)
    # - cron: '45 12 * * 2'   # Tuesday   6:15 PM -- Long-form A
    # - cron: '45 12 * * 6'   # Saturday  6:15 PM -- Long-form B
    # Shorts from Tue's long-form: Wed/Thu/Fri at 1:15 PM IST (7:45 UTC)
    # - cron: '45 7 * * 3'    # Wednesday 1:15 PM -- Short Part 1 (Tue's topic)
    # - cron: '45 7 * * 4'    # Thursday  1:15 PM -- Short Part 2 (Tue's topic)
    # - cron: '45 7 * * 5'    # Friday    1:15 PM -- Short Part 3 (Tue's topic)
    # Shorts from Sat's long-form: Sun/Mon/Tue-morning
    # - cron: '45 7 * * 0'    # Sunday    1:15 PM -- Short Part 1 (Sat's topic)
    # - cron: '45 7 * * 1'    # Monday    1:15 PM -- Short Part 2 (Sat's topic)
    # - cron: '0 16 * * 2'    # Tuesday   9:30 PM -- Short Part 3 (Sat's topic) (next week)

  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic slug (e.g., kafka, load-balancing)'
        required: true
      session:
        description: 'Session number'
        required: true
      render_only:
        description: 'Only render, do not upload'
        type: boolean
        default: false
      upload_only:
        description: 'Only upload (video must exist as artifact)'
        type: boolean
        default: false

env:
  NODE_VERSION: '20'

jobs:
  render:
    if: ${{ !inputs.upload_only }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome + TTS + ffmpeg
        run: |
          npx remotion browser ensure
          pip install --break-system-packages edge-tts
          sudo apt-get update && sudo apt-get install -y "ffmpeg=7:*" fonts-dejavu fonts-noto
          python3 -c "import edge_tts; print('edge_tts OK')"
          ffmpeg -version | head -1

      - name: Clone content repo
        run: |
          git clone --depth 1 https://github.com/Gaurav1112/guru-sishya.git ../guru-sishya
          ln -sf "$(pwd)/../guru-sishya/public/content" content 2>/dev/null || true
          ls content/*.json | head -3 || { echo "FATAL: content not accessible"; exit 1; }

      - name: Determine what to render
        id: pick
        run: |
          if [ -n "${{ inputs.topic }}" ]; then
            echo "topic=${{ inputs.topic }}" >> $GITHUB_OUTPUT
            echo "session=${{ inputs.session }}" >> $GITHUB_OUTPUT
          else
            # Auto-pick next from queue based on day of week
            NEXT=$(npx tsx scripts/get-next-publish.ts --json 2>/dev/null || echo '{}')
            TOPIC=$(echo "$NEXT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('topic','kafka'))" 2>/dev/null || echo "kafka")
            SESSION=$(echo "$NEXT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('session',1))" 2>/dev/null || echo "1")
            echo "topic=$TOPIC" >> $GITHUB_OUTPUT
            echo "session=$SESSION" >> $GITHUB_OUTPUT
          fi

      - name: Generate storyboard + TTS audio
        run: npx tsx scripts/render-session.ts ${{ steps.pick.outputs.topic }} ${{ steps.pick.outputs.session }}

      - name: Render long-form video
        run: |
          mkdir -p output/videos
          npx remotion render src/compositions/index.tsx LongVideo \
            output/videos/long.mp4 \
            --props=output/test-props-s${{ steps.pick.outputs.session }}.json \
            --codec=h264 --crf=18 --audio-bitrate=192K --concurrency=1 \
            --timeout=180000

      - name: Render vertical video
        run: |
          npx remotion render src/compositions/index.tsx VerticalLong \
            output/videos/vertical.mp4 \
            --props=output/test-props-s${{ steps.pick.outputs.session }}.json \
            --codec=h264 --crf=18 --audio-bitrate=192K --concurrency=1 \
            --timeout=180000

      - name: Split vertical into parts with ffmpeg
        run: |
          TOPIC="${{ steps.pick.outputs.topic }}"
          SESSION="${{ steps.pick.outputs.session }}"
          VIDEO="output/videos/vertical.mp4"

          if [ ! -f "$VIDEO" ]; then
            echo "WARNING: vertical.mp4 not found, skipping split"
            exit 0
          fi

          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$VIDEO" | cut -d. -f1)
          echo "Total duration: ${DURATION}s"

          if [ -z "$DURATION" ] || [ "$DURATION" -lt 30 ]; then
            echo "WARNING: Duration too short or unreadable, skipping split"
            exit 0
          fi

          PART_DUR=$(( (DURATION + 2) / 3 ))
          for P in 1 2 3; do
            START=$(( (P - 1) * PART_DUR ))
            if [ "$P" -eq 3 ]; then
              ffmpeg -y -i "$VIDEO" -ss "$START" -codec copy \
                "output/videos/${TOPIC}-s${SESSION}-part${P}of3.mp4" 2>/dev/null
            else
              ffmpeg -y -i "$VIDEO" -ss "$START" -t "$PART_DUR" -codec copy \
                "output/videos/${TOPIC}-s${SESSION}-part${P}of3.mp4" 2>/dev/null
            fi
          done
          ls -lh output/videos/*part* 2>/dev/null || echo "No parts created"

      - name: Generate thumbnail
        continue-on-error: true
        run: |
          npx remotion still src/compositions/index.tsx Thumbnail \
            output/videos/thumbnail.png \
            --props=output/test-props-s${{ steps.pick.outputs.session }}.json

      - name: Generate metadata
        run: |
          npx tsx scripts/generate-upload-metadata.ts ${{ steps.pick.outputs.topic }} ${{ steps.pick.outputs.session }}
          cp output/${{ steps.pick.outputs.topic }}-s${{ steps.pick.outputs.session }}*.json output/videos/ 2>/dev/null || true

      - name: Write manifest
        run: |
          cat > output/videos/manifest.json << MANIFEST_EOF
          {
            "topic": "${{ steps.pick.outputs.topic }}",
            "session": ${{ steps.pick.outputs.session }},
            "renderedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          MANIFEST_EOF

      - name: Upload artifacts (temporary, deleted after publish)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.pick.outputs.topic }}-s${{ steps.pick.outputs.session }}
          path: output/videos/
          retention-days: 3

    outputs:
      topic: ${{ steps.pick.outputs.topic }}
      session: ${{ steps.pick.outputs.session }}

  publish:
    needs: render
    if: ${{ !inputs.render_only }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Download rendered videos
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.render.outputs.topic }}-s${{ needs.render.outputs.session }}
          path: output/videos/

      - name: Detect upload type from day of week
        id: daytype
        run: |
          DOW=$(date -u +%u)  # 1=Mon, 2=Tue, ..., 7=Sun
          echo "dow=$DOW" >> $GITHUB_OUTPUT
          if [ "$DOW" = "2" ] || [ "$DOW" = "6" ]; then
            echo "type=long" >> $GITHUB_OUTPUT
            echo "Today is long-form day (Tue/Sat)"
          else
            echo "type=short" >> $GITHUB_OUTPUT
            echo "Today is Shorts day"
          fi
          # Manual trigger always uploads everything
          if [ -n "${{ inputs.topic }}" ]; then
            echo "type=all" >> $GITHUB_OUTPUT
            echo "Manual trigger -- uploading all"
          fi

      - name: Upload long-form to YouTube (with retry)
        if: steps.daytype.outputs.type == 'long' || steps.daytype.outputs.type == 'all'
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          TOPIC=${{ needs.render.outputs.topic }}
          SESSION=${{ needs.render.outputs.session }}
          METADATA=$(ls output/videos/${TOPIC}-s${SESSION}-metadata.json 2>/dev/null || echo "")
          if [ -n "$METADATA" ] && [ -f "output/videos/long.mp4" ]; then
            for attempt in 1 2 3; do
              echo "Upload attempt $attempt/3..."
              if npx tsx scripts/upload-youtube.ts output/videos/long.mp4 "$METADATA"; then
                echo "Long-form uploaded successfully"
                break
              else
                echo "Attempt $attempt failed"
                if [ "$attempt" -lt 3 ]; then
                  echo "Retrying in 60 seconds..."
                  sleep 60
                else
                  echo "All 3 attempts failed"
                  exit 1
                fi
              fi
            done
          else
            echo "WARNING: No long-form video or metadata found -- skipping"
          fi

      - name: Upload shorts to YouTube (with retry)
        if: steps.daytype.outputs.type == 'short' || steps.daytype.outputs.type == 'all'
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          TOPIC=${{ needs.render.outputs.topic }}
          SESSION=${{ needs.render.outputs.session }}

          DOW=${{ steps.daytype.outputs.dow }}
          case $DOW in
            3) PARTS="1" ;;
            4) PARTS="2" ;;
            5) PARTS="3" ;;
            7) PARTS="1" ;;
            1) PARTS="2" ;;
            2) PARTS="3" ;;
            *) PARTS="1 2 3" ;;
          esac

          for PART in $PARTS; do
            VIDEO=$(ls output/videos/*part${PART}of*.mp4 2>/dev/null | head -1)
            META=$(ls output/videos/${TOPIC}-s${SESSION}-part${PART}-metadata.json 2>/dev/null | head -1)
            if [ -n "$VIDEO" ] && [ -f "$VIDEO" ] && [ -n "$META" ]; then
              for attempt in 1 2 3; do
                echo "Uploading Part $PART (attempt $attempt/3)..."
                if npx tsx scripts/upload-youtube.ts "$VIDEO" "$META" --shorts; then
                  echo "Part $PART uploaded"
                  break
                else
                  echo "Attempt $attempt failed"
                  [ "$attempt" -lt 3 ] && sleep 60
                fi
              done
            else
              echo "WARNING: Part $PART not found -- skipping"
            fi
          done

      - name: Update queue
        if: success()
        run: |
          git config user.name "Guru Sishya Bot"
          git config user.email "bot@guru-sishya.in"
          git add config/ || true
          git diff --staged --quiet || git commit -m "chore: published ${{ needs.render.outputs.topic }} S${{ needs.render.outputs.session }} [skip ci]"
          git push || true
