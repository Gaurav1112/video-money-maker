name: Daily Publish Pipeline

on:
  schedule:
    # 06:00 IST = 00:30 UTC
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      episode:
        description: 'Episode number (leave blank for latest)'
        required: false
      dry_run:
        description: 'Dry run (no actual uploads)'
        type: boolean
        default: false

concurrency:
  group: publish-pipeline
  cancel-in-progress: false

jobs:
  # ── Step 1: Generate metadata & render video ─────────────────────────────────
  render:
    name: Render video
    runs-on: ubuntu-latest
    outputs:
      episode: ${{ steps.meta.outputs.episode }}
      metadata_path: ${{ steps.meta.outputs.metadata_path }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Generate metadata & render
        id: meta
        env:
          EPISODE: ${{ inputs.episode }}
        run: |
          npx tsx scripts/render.ts ${EPISODE:+--episode $EPISODE}
          echo "episode=$(cat out/episode.txt)" >> "$GITHUB_OUTPUT"
          echo "metadata_path=out/metadata.json" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: episode-artifacts
          path: out/
          retention-days: 1

  # ── Step 2: Upload to YouTube ────────────────────────────────────────────────
  upload-youtube:
    name: Upload → YouTube
    needs: render
    runs-on: ubuntu-latest
    outputs:
      youtube_url: ${{ steps.upload.outputs.youtube_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: npm }
      - run: npm ci

      - uses: actions/download-artifact@v8
        with: { name: episode-artifacts, path: out/ }

      - name: Upload video to YouTube
        id: upload
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          npx tsx scripts/upload-youtube.ts --metadata out/metadata.json
          echo "youtube_url=$(cat out/youtube_url.txt)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: episode-artifacts-with-yt-url
          path: out/
          retention-days: 1

  # ── Step 3: Distribution matrix (parallel) ───────────────────────────────────

  post-instagram:
    name: Post → Instagram Reels
    needs: upload-youtube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: npm }
      - run: npm ci

      - uses: actions/download-artifact@v8
        with: { name: episode-artifacts-with-yt-url, path: out/ }

      - name: Publish to Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: npx tsx scripts/publish-instagram.ts --metadata out/metadata.json

  post-community:
    name: Post → YouTube Community
    needs: upload-youtube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: npm }
      - run: npm ci --ignore-scripts  # Playwright install handled separately

      - uses: actions/download-artifact@v8
        with: { name: episode-artifacts-with-yt-url, path: out/ }

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Post community teaser
        env:
          YT_STUDIO_COOKIES: ${{ secrets.YT_STUDIO_COOKIES }}
          YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: npx tsx scripts/post-community.ts --metadata out/metadata.json --type teaser

  # ── NEW LEG: Telegram Broadcast ───────────────────────────────────────────────
  post-telegram:
    name: Post → Telegram Channel
    needs: upload-youtube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: episode-artifacts-with-yt-url
          path: out/

      - name: Broadcast to Telegram channel
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHANNEL_ID: ${{ secrets.TG_CHANNEL_ID }}
          TG_DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
          METADATA_DIR: out
        run: npx tsx scripts/publish-telegram.ts --metadata out/metadata.json

  # ── Step 4: Summary ───────────────────────────────────────────────────────────
  notify-success:
    name: Pipeline complete
    needs: [post-instagram, post-community, post-telegram]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Print summary
        run: |
          echo "## ✅ Daily publish complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| YouTube  | ✅ Uploaded |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Instagram Reels | ✅ Posted |" >> "$GITHUB_STEP_SUMMARY"
          echo "| YouTube Community | ✅ Posted |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Telegram** | ✅ **Broadcast sent** |" >> "$GITHUB_STEP_SUMMARY"
