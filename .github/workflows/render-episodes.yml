name: Cartoon Pipeline

# ────────────────────────────────────────────────────────────────────────────
# SECURITY HARDENING (applied 2025-05-03)
#
# 1. All `uses:` pinned to immutable commit SHAs (supply-chain: CWE-494)
# 2. `permissions:` block added — least-privilege (CWE-269)
# 3. `concurrency:` block added — prevents TOCTOU race on queue file (CWE-362)
# 4. ALL ${{ }} expressions moved out of `run:` blocks into `env:` vars
#    — eliminates shell injection vectors (CWE-78, RANK-10 finding)
# ────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Mon/Wed/Fri: Render + upload batch 1 (hi, te, ta, en) at 4:30 AM UTC = 10:00 AM IST
    - cron: '30 4 * * 1,3,5'
    # Tue/Thu/Sat: Upload batch 2 (kn, mr, bn) at 4:30 AM UTC
    - cron: '30 4 * * 2,4,6'
  workflow_dispatch:
    inputs:
      episode:
        description: 'Episode number (0 = next unrendered)'
        required: false
        default: '0'

# Prevent duplicate runs: two simultaneous triggers (cron + manual) would both
# attempt git push → one silently loses its queue commit.
concurrency:
  group: cartoon-pipeline-${{ github.ref }}
  cancel-in-progress: false   # never cancel a render/upload that is mid-flight

# Least-privilege: this workflow writes the episode registry back to main.
# No packages, no PR, no issues access needed.
permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # SHA-pinned: actions/checkout v4.2.2
      # Verify: https://github.com/actions/checkout/releases/tag/v4.2.2
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      # SHA-pinned: actions/setup-node v4.4.0
      # Verify: https://github.com/actions/setup-node/releases/tag/v4.4.0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq "ffmpeg=7:*" fonts-dejavu fonts-noto fonts-noto-devanagari
          pip3 install --quiet edge-tts

      - name: Install Rhubarb
        run: |
          wget -q https://github.com/DanielSWolf/rhubarb-lip-sync/releases/download/v1.13.0/Rhubarb-Lip-Sync-1.13.0-Linux.zip
          unzip -q Rhubarb-Lip-Sync-1.13.0-Linux.zip -d /opt/rhubarb
          echo "/opt/rhubarb" >> "$GITHUB_PATH"

      # ── FIX: Rank-10 shell injection at original lines 38-40 ─────────────
      # BEFORE (VULNERABLE): INPUT_EP was set by interpolating the GHA expression
      # directly into the shell script text. An attacker dispatching the workflow
      # with a crafted episode value could execute arbitrary commands.
      #
      # AFTER (SAFE): the expression is placed in `env:` — the shell receives it
      # as a process environment variable, never as literal script text.
      # ─────────────────────────────────────────────────────────────────────
      - name: Determine what to do
        id: plan
        env:
          # SAFE: expression lives in env block, not in shell script text
          INPUT_EP: ${{ github.event.inputs.episode || '0' }}
        run: |
          DAY=$(date -u +%u)  # 1=Mon, 2=Tue, etc.
          LAST_RENDERED=$(jq '.lastRendered' config/episode-registry.json)
          LAST_UPLOADED=$(jq '.lastUploaded' config/episode-registry.json)
          NEXT_EP=$((LAST_RENDERED + 1))

          # INPUT_EP comes from the env var — NOT from template expansion in shell
          if [ "$INPUT_EP" != "0" ]; then
            NEXT_EP="$INPUT_EP"
          fi

          # Mon/Wed/Fri (1,3,5): render + upload batch 1
          # Tue/Thu/Sat (2,4,6): upload batch 2 only
          if [ "$DAY" = "1" ] || [ "$DAY" = "3" ] || [ "$DAY" = "5" ] || [ "$INPUT_EP" != "0" ]; then
            echo "render=true" >> "$GITHUB_OUTPUT"
            echo "upload_langs=hi,te,ta,en" >> "$GITHUB_OUTPUT"
          else
            echo "render=false" >> "$GITHUB_OUTPUT"
            echo "upload_langs=kn,mr,bn" >> "$GITHUB_OUTPUT"
          fi

          echo "episode=$NEXT_EP" >> "$GITHUB_OUTPUT"

      - name: Render episode
        if: steps.plan.outputs.render == 'true'
        run: npx tsx scripts/batch-render.ts --limit 1
        timeout-minutes: 60

      # ── FIX: step-output injection at original line 73 ───────────────────
      # BEFORE (VULNERABLE): step output was interpolated directly into the
      # shell command text. Step outputs can be attacker-controlled if an
      # earlier step echoes untrusted data to GITHUB_OUTPUT.
      #
      # AFTER (SAFE): step output moved to env var; shell reads $EPISODE safely.
      # ─────────────────────────────────────────────────────────────────────
      - name: Upload to YouTube
        env:
          EPISODE: ${{ steps.plan.outputs.episode }}
          UPLOAD_LANGS: ${{ steps.plan.outputs.upload_langs }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_HI: ${{ secrets.YOUTUBE_REFRESH_TOKEN_HI }}
          YOUTUBE_REFRESH_TOKEN_TE: ${{ secrets.YOUTUBE_REFRESH_TOKEN_TE }}
          YOUTUBE_REFRESH_TOKEN_TA: ${{ secrets.YOUTUBE_REFRESH_TOKEN_TA }}
          YOUTUBE_REFRESH_TOKEN_KN: ${{ secrets.YOUTUBE_REFRESH_TOKEN_KN }}
          YOUTUBE_REFRESH_TOKEN_MR: ${{ secrets.YOUTUBE_REFRESH_TOKEN_MR }}
          YOUTUBE_REFRESH_TOKEN_BN: ${{ secrets.YOUTUBE_REFRESH_TOKEN_BN }}
          YOUTUBE_REFRESH_TOKEN_EN: ${{ secrets.YOUTUBE_REFRESH_TOKEN_EN }}
        run: npx tsx scripts/upload-youtube.ts "$EPISODE"

      # ── FIX: step-output injection at original line 81 ───────────────────
      # BEFORE (VULNERABLE): step output was interpolated directly into the
      # git commit message text inside the run: block.
      #
      # AFTER (SAFE): EPISODE env var used; shell expands ${EPISODE}, not
      # the GHA template engine.
      # ─────────────────────────────────────────────────────────────────────
      - name: Commit registry
        if: always()
        env:
          EPISODE: ${{ steps.plan.outputs.episode }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add config/episode-registry.json config/publish-queue.json
          # FIX: use group command { } not subshell ( ) so exit code propagates
          git diff --cached --quiet || git commit -m "chore: pipeline ep ${EPISODE}"
          git push || { git pull --rebase origin main && git push; }

      - name: Cleanup old output
        if: always()
        run: rm -rf output/
