name: TEST — One-time upload at 5 PM IST today

# This workflow fires ONCE: May 1, 2026 at 5:00 PM IST (11:30 UTC)
# DELETE THIS FILE after the test

on:
  schedule:
    - cron: '30 11 1 5 *'   # May 1 at 11:30 UTC = 5:00 PM IST (one-time)

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  test-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Install TTS + audio tools
        run: |
          pip install edge-tts
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Clone content repo
        run: |
          git clone --depth 1 https://github.com/Gaurav1112/guru-sishya.git ../guru-sishya
          ln -sf "$(pwd)/../guru-sishya/public/content" content

      - name: Generate storyboard + TTS
        run: npx tsx scripts/render-session.ts kafka 3

      - name: Render long-form video
        run: |
          mkdir -p output/videos
          npx remotion render src/compositions/index.tsx LongVideo \
            output/videos/long.mp4 \
            --props=output/test-props-s3.json \
            --codec=h264 --crf=18 --audio-bitrate=192K --concurrency=2

      - name: Render full vertical video
        run: |
          npx remotion render src/compositions/index.tsx VerticalLong \
            output/videos/vertical.mp4 \
            --props=output/test-props-s3.json \
            --codec=h264 --crf=18 --audio-bitrate=192K --concurrency=2

      - name: Split vertical into 3 parts using ffmpeg
        run: |
          # Get video duration in seconds
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 output/videos/vertical.mp4 | cut -d. -f1)
          THIRD=$((DURATION / 3))

          # Part 1: 0 to 1/3
          ffmpeg -y -i output/videos/vertical.mp4 -ss 0 -t $THIRD \
            -c:v libx264 -c:a aac output/videos/kafka-s3-part1of3.mp4

          # Part 2: 1/3 to 2/3
          ffmpeg -y -i output/videos/vertical.mp4 -ss $THIRD -t $THIRD \
            -c:v libx264 -c:a aac output/videos/kafka-s3-part2of3.mp4

          # Part 3: 2/3 to end
          ffmpeg -y -i output/videos/vertical.mp4 -ss $((THIRD * 2)) \
            -c:v libx264 -c:a aac output/videos/kafka-s3-part3of3.mp4

          echo "Parts created:"
          ls -lh output/videos/kafka-s3-part*.mp4

      - name: Generate thumbnail
        run: |
          npx remotion still src/compositions/index.tsx Thumbnail \
            output/videos/thumbnail.png \
            --props=output/test-props-s3.json 2>/dev/null || true

      - name: Generate metadata
        run: |
          npx tsx scripts/generate-upload-metadata.ts kafka 3
          cp output/kafka-s3*.json output/videos/

      - name: Verify videos before upload
        run: |
          echo "=== Pre-upload verification ==="
          echo "Long-form:"
          ls -lh output/videos/long.mp4 2>/dev/null || echo "  ❌ MISSING"
          echo "Vertical parts:"
          ls -lh output/videos/kafka-s3-part*.mp4 2>/dev/null || echo "  ❌ MISSING"
          echo "Metadata:"
          ls -lh output/videos/kafka-s3*metadata*.json 2>/dev/null || echo "  ❌ MISSING"
          echo "Thumbnail:"
          ls -lh output/videos/thumbnail.png 2>/dev/null || echo "  ❌ MISSING"

          # Check long-form is real (>10MB = has audio)
          LONG_SIZE=$(stat -c%s output/videos/long.mp4 2>/dev/null || echo "0")
          if [ "$LONG_SIZE" -lt 10485760 ]; then
            echo "⚠️ Long-form is only $(($LONG_SIZE / 1048576))MB — likely missing audio!"
          else
            echo "✅ Long-form size OK: $(($LONG_SIZE / 1048576))MB"
          fi

      - name: Upload long-form to YouTube (NOT as Short)
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          METADATA=$(ls output/videos/kafka-s3-metadata.json 2>/dev/null | head -1)
          VIDEO="output/videos/long.mp4"

          # Refuse to upload if video is too small (no audio = bad)
          SIZE=$(stat -c%s "$VIDEO" 2>/dev/null || echo "0")
          if [ "$SIZE" -lt 10485760 ]; then
            echo "❌ Long-form too small ($SIZE bytes) — likely corrupted. Skipping upload."
            exit 1
          fi

          if [ -f "$VIDEO" ] && [ -n "$METADATA" ]; then
            for attempt in 1 2 3; do
              echo "📤 Long-form upload attempt $attempt/3 ($(($SIZE / 1048576))MB)..."
              if npx tsx scripts/upload-youtube.ts "$VIDEO" "$METADATA"; then
                echo "✅ Kafka S3 Long-form uploaded as regular YouTube video!"
                break
              fi
              [ "$attempt" -lt 3 ] && sleep 60
            done
          fi

      - name: Upload shorts (vertical parts) to YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          for PART in 1 2 3; do
            VIDEO="output/videos/kafka-s3-part${PART}of3.mp4"
            META=$(ls output/videos/kafka-s3-part${PART}-metadata.json 2>/dev/null | head -1)

            # Generate metadata if missing
            if [ -z "$META" ]; then
              echo "No part metadata found, generating..."
              npx tsx scripts/generate-upload-metadata.ts kafka 3 2>/dev/null || true
              cp output/kafka-s3-part${PART}-metadata.json output/videos/ 2>/dev/null || true
              META=$(ls output/videos/kafka-s3-part${PART}-metadata.json 2>/dev/null | head -1)
            fi

            if [ -f "$VIDEO" ] && [ -n "$META" ]; then
              SIZE=$(stat -f%z "$VIDEO" 2>/dev/null || stat -c%s "$VIDEO" 2>/dev/null || echo "0")
              if [ "$SIZE" -lt 1048576 ]; then
                echo "⚠️ Part $PART too small ($SIZE bytes) — skipping"
                continue
              fi
              for attempt in 1 2 3; do
                echo "📤 Short Part $PART attempt $attempt/3 ($(($SIZE / 1048576))MB)..."
                if npx tsx scripts/upload-youtube.ts "$VIDEO" "$META" --shorts; then
                  echo "✅ Part $PART uploaded as YouTube Short!"
                  break
                fi
                [ "$attempt" -lt 3 ] && sleep 60
              done
            else
              echo "⚠️ Part $PART video or metadata missing — skipping"
            fi
            sleep 30
          done

      - name: Test result
        if: always()
        run: |
          echo "================================="
          echo "TEST UPLOAD COMPLETE"
          echo "Time: $(TZ=Asia/Kolkata date)"
          echo "Videos rendered: $(ls output/videos/*.mp4 2>/dev/null | wc -l)"
          echo "================================="
