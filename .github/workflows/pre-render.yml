name: Pre-Render Videos (4 hours before upload)

# Runs 4 HOURS before each upload slot to ensure videos are ready.
# If render fails, there's still time for retry before the upload window.

on:
  schedule:
    # 4 hours before each upload time (IST -> UTC)
    # Long-form uploads at 6:15 PM IST -> pre-render at 2:15 PM IST (8:45 UTC)
    - cron: '45 8 * * 2'     # Tuesday    2:15 PM IST -- pre-render for Tue 6:15 PM upload
    - cron: '45 8 * * 6'     # Saturday   2:15 PM IST -- pre-render for Sat 6:15 PM upload
    # Shorts upload at 1:15 PM IST -> pre-render at 9:15 AM IST (3:45 UTC)
    - cron: '45 3 * * 3'     # Wednesday  9:15 AM IST -- pre-render for Wed 1:15 PM upload
    - cron: '45 3 * * 4'     # Thursday   9:15 AM IST -- pre-render for Thu 1:15 PM upload
    - cron: '45 3 * * 5'     # Friday     9:15 AM IST -- pre-render for Fri 1:15 PM upload
    - cron: '45 3 * * 0'     # Sunday     9:15 AM IST -- pre-render for Sun 1:15 PM upload
    - cron: '45 3 * * 1'     # Monday     9:15 AM IST -- pre-render for Mon 1:15 PM upload
    - cron: '0 12 * * 2'     # Tuesday   5:30 PM IST -- pre-render for Tue 9:30 PM Short

  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic slug'
        required: false
      session:
        description: 'Session number'
        required: false

permissions:
  contents: write
  actions: write   # needed to upload artifacts

env:
  NODE_VERSION: '20'

jobs:
  pre-render:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome + TTS + audio tools
        run: |
          npx remotion browser ensure
          pip install --break-system-packages edge-tts
          sudo apt-get update && sudo apt-get install -y "ffmpeg=7:*" fonts-dejavu fonts-noto fonts-lohit-devanagari
          # Verify installations
          edge-tts --help >/dev/null 2>&1 && echo "edge-tts OK" || echo "edge-tts WARNING: not on PATH"
          python3 -c "import edge_tts; print('edge_tts module OK')"
          ffmpeg -version | head -1

      - name: Clone content repo
        run: |
          git clone --depth 1 https://github.com/Gaurav1112/guru-sishya.git ../guru-sishya
          # render-session.ts resolves CONTENT_DIR as ../../guru-sishya/public/content
          # relative to scripts/ dir, which = ../guru-sishya/public/content from repo root.
          # Also create symlink so 'content/' works if anything uses it directly.
          ln -sf "$(pwd)/../guru-sishya/public/content" content 2>/dev/null || true
          # Verify content is accessible
          ls content/*.json | head -3 || { echo "FATAL: content not accessible"; exit 1; }

      - name: Determine what to render
        id: pick
        run: |
          if [ -n "${{ inputs.topic }}" ]; then
            echo "topic=${{ inputs.topic }}" >> $GITHUB_OUTPUT
            echo "session=${{ inputs.session || '1' }}" >> $GITHUB_OUTPUT
          else
            NEXT=$(npx tsx scripts/get-next-publish.ts --json 2>/dev/null || echo '{}')
            TOPIC=$(echo "$NEXT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('topic','kafka'))" 2>/dev/null || echo "kafka")
            SESSION=$(echo "$NEXT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('session',1))" 2>/dev/null || echo "1")
            echo "topic=$TOPIC" >> $GITHUB_OUTPUT
            echo "session=$SESSION" >> $GITHUB_OUTPUT
          fi
          echo "Rendering: topic=${{ steps.pick.outputs.topic || 'TBD' }} session=${{ steps.pick.outputs.session || 'TBD' }}"

      - name: Generate storyboard + TTS audio
        run: npx tsx scripts/render-session.ts ${{ steps.pick.outputs.topic }} ${{ steps.pick.outputs.session }}

      - name: Render long-form video
        run: |
          mkdir -p output/videos
          npx remotion render src/compositions/index.tsx LongVideo \
            output/videos/long.mp4 \
            --props=output/test-props-s${{ steps.pick.outputs.session }}.json \
            --codec=h264 --crf=18 --audio-bitrate=192K --concurrency=1 \
            --timeout=180000

      - name: Render vertical video
        run: |
          npx remotion render src/compositions/index.tsx VerticalLong \
            output/videos/vertical.mp4 \
            --props=output/test-props-s${{ steps.pick.outputs.session }}.json \
            --codec=h264 --crf=18 --audio-bitrate=192K --concurrency=1 \
            --timeout=180000

      - name: Split vertical into parts with ffmpeg
        run: |
          # Read storyboard to compute split points using part-splitter logic
          # Fallback: split evenly into 3 parts using ffmpeg (works on any OS)
          TOPIC="${{ steps.pick.outputs.topic }}"
          SESSION="${{ steps.pick.outputs.session }}"
          VIDEO="output/videos/vertical.mp4"

          if [ ! -f "$VIDEO" ]; then
            echo "WARNING: vertical.mp4 not found, skipping split"
            exit 0
          fi

          # Get total duration in seconds
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$VIDEO" | cut -d. -f1)
          echo "Total duration: ${DURATION}s"

          if [ -z "$DURATION" ] || [ "$DURATION" -lt 30 ]; then
            echo "WARNING: Duration too short or unreadable, skipping split"
            exit 0
          fi

          # Split into 3 equal parts
          PART_DUR=$(( (DURATION + 2) / 3 ))
          echo "Part duration: ~${PART_DUR}s"

          for P in 1 2 3; do
            START=$(( (P - 1) * PART_DUR ))
            # Last part gets the remainder
            if [ "$P" -eq 3 ]; then
              ffmpeg -y -i "$VIDEO" -ss "$START" -codec copy \
                "output/videos/${TOPIC}-s${SESSION}-part${P}of3.mp4" 2>/dev/null
            else
              ffmpeg -y -i "$VIDEO" -ss "$START" -t "$PART_DUR" -codec copy \
                "output/videos/${TOPIC}-s${SESSION}-part${P}of3.mp4" 2>/dev/null
            fi
            echo "Part $P: start=${START}s"
          done

          ls -lh output/videos/*part* 2>/dev/null || echo "No parts created"

      - name: Generate thumbnail
        continue-on-error: true
        run: |
          npx remotion still src/compositions/index.tsx Thumbnail \
            output/videos/thumbnail.png \
            --props=output/test-props-s${{ steps.pick.outputs.session }}.json

      - name: Generate metadata
        run: |
          npx tsx scripts/generate-upload-metadata.ts ${{ steps.pick.outputs.topic }} ${{ steps.pick.outputs.session }}
          cp output/${{ steps.pick.outputs.topic }}-s${{ steps.pick.outputs.session }}*.json output/videos/ 2>/dev/null || true

      - name: Write manifest file (so upload workflow knows what was rendered)
        run: |
          cat > output/videos/manifest.json << MANIFEST_EOF
          {
            "topic": "${{ steps.pick.outputs.topic }}",
            "session": ${{ steps.pick.outputs.session }},
            "renderedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "files": $(ls output/videos/ | python3 -c "import json,sys; print(json.dumps(sys.stdin.read().strip().split('\n')))")
          }
          MANIFEST_EOF
          cat output/videos/manifest.json

      - name: Store as artifact (ready for upload workflow)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ready-${{ steps.pick.outputs.topic }}-s${{ steps.pick.outputs.session }}
          path: output/videos/
          retention-days: 3

      - name: Log success
        run: |
          echo "Pre-render complete for ${{ steps.pick.outputs.topic }} S${{ steps.pick.outputs.session }}"
          echo "Videos are ready for upload at the scheduled time"
          ls -lh output/videos/
