name: Daily Publish — Hinglish Track

on:
  schedule:
    # Panel-20 Dist P1-5 (Blake): 07:00 UTC = 12:30 PM IST is the
    # Indian school/college lunch window — low engagement vs the
    # 7:00 PM IST peak that the primary daily-short.yml track
    # documents. Move to 13:30 UTC = 7:00 PM IST, matching the
    # primary track's algorithmic peak. Same-channel dual upload
    # in the SAME peak hour is fine: YT Shorts uses video-level
    # signals, not channel-level rate-limiting in the discovery
    # shelf.
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic slug (e.g. kafka-partitioning). Leave blank to use queue."
        required: false
        default: ""
      session:
        description: "Session number (1-based). Leave blank for next unrendered."
        required: false
        default: ""
      dry_run:
        description: "Dry run — render audio but skip YouTube upload"
        required: false
        default: "false"
        type: boolean

concurrency:
  # Only one Hinglish publish at a time; don't cancel in-progress runs
  group: hinglish-publish
  cancel-in-progress: false

jobs:
  # ── Job 1: Determine what to render/upload ──────────────────────────────
  determine:
    name: Determine next Hinglish session
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      topic: ${{ steps.pick.outputs.topic }}
      session: ${{ steps.pick.outputs.session }}
      skip: ${{ steps.pick.outputs.skip }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Pick next Hinglish session
        id: pick
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          SESSION="${{ github.event.inputs.session }}"

          if [ -n "$TOPIC" ] && [ -n "$SESSION" ]; then
            echo "topic=$TOPIC" >> $GITHUB_OUTPUT
            echo "session=$SESSION" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            # Use existing queue picker — reads from publish-queue.json
            # and filters for entries where hinglish_published != true
            OUTPUT=$(npx tsx scripts/get-next-hinglish-session.ts 2>&1)
            if echo "$OUTPUT" | grep -q "NO_SESSION"; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "No unpublished Hinglish sessions in queue — skipping"
            else
              TOPIC=$(echo "$OUTPUT" | grep "^topic=" | cut -d= -f2)
              SESSION=$(echo "$OUTPUT" | grep "^session=" | cut -d= -f2)
              echo "topic=$TOPIC" >> $GITHUB_OUTPUT
              echo "session=$SESSION" >> $GITHUB_OUTPUT
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          fi

  # ── Job 2: Render Hinglish audio ────────────────────────────────────────
  render-hinglish:
    name: Render Hinglish audio (${{ needs.determine.outputs.topic }} s${{ needs.determine.outputs.session }})
    needs: determine
    if: needs.determine.outputs.skip == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq "ffmpeg=7:*" fonts-dejavu fonts-noto
          pip3 install --quiet "edge-tts==7.0.0"

      - name: Render Hinglish audio
        id: render
        env:
          TOPIC: ${{ needs.determine.outputs.topic }}
          SESSION: ${{ needs.determine.outputs.session }}
        run: |
          npx tsx scripts/render-hinglish-audio.ts \
            --topic "$TOPIC" \
            --session "$SESSION" \
            --output-dir output/hinglish

          # Capture output paths from the render script
          echo "audio_path=output/hinglish/${TOPIC}/session-${SESSION}/audio-hi.mp3" >> $GITHUB_OUTPUT
          echo "video_path=output/hinglish/${TOPIC}/session-${SESSION}/video-with-hinglish.mp4" >> $GITHUB_OUTPUT

      - name: Validate audio output
        run: |
          AUDIO="${{ steps.render.outputs.audio_path }}"
          if [ ! -f "$AUDIO" ]; then
            echo "❌ Expected audio file not found: $AUDIO"
            exit 1
          fi
          SIZE=$(stat -c%s "$AUDIO")
          if [ "$SIZE" -lt 10000 ]; then
            echo "❌ Audio file too small (${SIZE} bytes) — likely empty render"
            exit 1
          fi
          echo "✅ Audio OK: $AUDIO (${SIZE} bytes)"
          # Print duration via ffprobe
          ffprobe -v quiet -show_entries format=duration -of csv=p=0 "$AUDIO" || true

      - name: Upload audio artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hinglish-audio-${{ needs.determine.outputs.topic }}-s${{ needs.determine.outputs.session }}
          path: output/hinglish/
          retention-days: 7

  # ── Job 3: Upload to YouTube ─────────────────────────────────────────────
  upload-youtube:
    name: Upload Hinglish video to YouTube
    needs: [determine, render-hinglish]
    if: needs.determine.outputs.skip == 'false' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Download audio artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: hinglish-audio-${{ needs.determine.outputs.topic }}-s${{ needs.determine.outputs.session }}
          path: output/hinglish/

      - name: Upload Hinglish video to YouTube
        id: upload-hinglish
        env:
          TOPIC: ${{ needs.determine.outputs.topic }}
          SESSION: ${{ needs.determine.outputs.session }}
          # YouTube OAuth for GuruSishya-India channel (same channel, Hinglish playlist)
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          # Hinglish-specific playlist ID (create one in YouTube Studio → Playlists)
          YOUTUBE_HINGLISH_PLAYLIST_ID: ${{ secrets.YOUTUBE_HINGLISH_PLAYLIST_ID }}
        run: |
          npx tsx scripts/upload-hinglish-youtube.ts \
            --topic "$TOPIC" \
            --session "$SESSION" \
            --audio "output/hinglish/${TOPIC}/session-${SESSION}/audio-hi.mp3" \
            --playlist "$YOUTUBE_HINGLISH_PLAYLIST_ID"

      # ── Panel-21 P0-B: Cross-post Hinglish upload to all social platforms ──
      # Mirrors daily-short.yml lines 452-546. Each step is continue-on-error
      # so a failing social post never blocks the queue mark or commit.

      - name: Cross-post to X/Twitter
        if: success() && inputs.dry_run != 'true' && steps.upload-hinglish.outputs.video_id != ''
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        continue-on-error: true
        run: |
          META_PATH="${{ steps.upload-hinglish.outputs.metadata_path }}"
          VIDEO_URL="https://youtube.com/shorts/${{ steps.upload-hinglish.outputs.video_id }}"
          if [ -n "$META_PATH" ] && [ -f "$META_PATH" ]; then
            TOPIC=$(python3 -c "import sys,json; d=json.load(open('$META_PATH')); print(d.get('topic','Tech Short'))" 2>/dev/null || echo "Tech Short")
            X_TEXT=$(python3 -c "import sys,json; d=json.load(open('$META_PATH')); print(d.get('x_post',{}).get('text', d.get('hook','')))" 2>/dev/null || echo "")
            npx tsx scripts/cross-post-x.ts --topic "$TOPIC" --text "$X_TEXT" --url "$VIDEO_URL" || true
          fi

      - name: Cross-post to Instagram Reels
        if: success() && inputs.dry_run != 'true' && steps.upload-hinglish.outputs.video_id != ''
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        continue-on-error: true
        run: |
          META_PATH="${{ steps.upload-hinglish.outputs.metadata_path }}"
          MP4_PATH="${{ steps.upload-hinglish.outputs.video_path }}"
          if [ -z "${INSTAGRAM_ACCESS_TOKEN:-}" ] || [ -z "${INSTAGRAM_BUSINESS_ID:-}" ]; then
            echo "[instagram] secrets missing — skipping (configure INSTAGRAM_ACCESS_TOKEN + INSTAGRAM_BUSINESS_ID)"
            exit 0
          fi
          if [ -n "$META_PATH" ] && [ -f "$META_PATH" ] && [ -n "$MP4_PATH" ] && [ -f "$MP4_PATH" ]; then
            TOPIC=$(python3 -c "import sys,json; d=json.load(open('$META_PATH')); print(d.get('slug',''))" 2>/dev/null || echo "")
            npx tsx scripts/publish-to-instagram.ts --video "$MP4_PATH" --metadata "$META_PATH" --topic "$TOPIC" || true
          fi

      - name: Broadcast to Telegram
        if: success() && inputs.dry_run != 'true' && steps.upload-hinglish.outputs.video_id != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        continue-on-error: true
        run: |
          VIDEO_ID="${{ steps.upload-hinglish.outputs.video_id }}"
          META_PATH="${{ steps.upload-hinglish.outputs.metadata_path }}"
          if [ -n "$META_PATH" ] && [ -f "$META_PATH" ]; then
            npx tsx scripts/seed-telegram.ts "$VIDEO_ID" --metadata "$META_PATH" || true
          else
            npx tsx scripts/seed-telegram.ts "$VIDEO_ID" || true
          fi

      # Panel-20 ruling: do NOT add `|| true` here — continue-on-error preserves
      # step.outcome=failure visibility (LinkedIn token expiry, 429s, etc.)
      - name: Cross-post to LinkedIn
        if: success() && inputs.dry_run != 'true' && steps.upload-hinglish.outputs.video_id != ''
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
        continue-on-error: true
        run: |
          VIDEO_ID="${{ steps.upload-hinglish.outputs.video_id }}"
          META_PATH="${{ steps.upload-hinglish.outputs.metadata_path }}"
          if [ -n "$META_PATH" ] && [ -f "$META_PATH" ]; then
            npx tsx scripts/post-linkedin.ts "$VIDEO_ID" --metadata "$META_PATH"
          else
            npx tsx scripts/post-linkedin.ts "$VIDEO_ID"
          fi

      - name: Mark session as Hinglish-published
        env:
          TOPIC: ${{ needs.determine.outputs.topic }}
          SESSION: ${{ needs.determine.outputs.session }}
        run: |
          # Update publish-queue.json to set hinglish_published: true
          VIDEO_ID="${{ steps.upload-hinglish.outputs.video_id }}"
          npx tsx scripts/mark-hinglish-published.ts \
            --topic "$TOPIC" \
            --session "$SESSION" \
            ${VIDEO_ID:+--video-id "$VIDEO_ID"}

      - name: Commit updated publish queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add config/publish-queue.json
          git diff --cached --quiet || \
            git commit -m "chore: mark hinglish published — ${{ needs.determine.outputs.topic }} s${{ needs.determine.outputs.session }}"
          git push || (git pull --rebase origin main && git push)

  # ── Job 4: Notify on failure ─────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    needs: [determine, render-hinglish, upload-youtube]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Report failure
        run: |
          echo "::error::Hinglish publish pipeline failed"
          echo "Topic: ${{ needs.determine.outputs.topic }}"
          echo "Session: ${{ needs.determine.outputs.session }}"
          echo ""
          echo "Check the failed job logs above."
          echo "To retry: workflow_dispatch with same topic + session values."
          # Add Slack/Discord notification here if webhook is configured:
          # curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
          #   -H 'Content-type: application/json' \
          #   -d '{"text":"❌ Hinglish publish failed: ${{ needs.determine.outputs.topic }} s${{ needs.determine.outputs.session }}"}'
