# .github/workflows/render-episodes.yml  — RANK 6 PATCH
#
# This file shows the DIFF to apply to `.github/workflows/render-episodes.yml`.
# Two additions:
#
#  1. A new `community-teaser` job (separate cron: 30 min before pipeline job)
#     Posts a "new episode dropping soon" community post.
#
#  2. A `community-recap` step appended to the existing `pipeline` job,
#     running after `Upload to YouTube` succeeds, posting the recap with video URL.
#
# Apply by merging the diff below into render-episodes.yml.
# The full patched file is shown after the diff.
#
# ─── DIFF ────────────────────────────────────────────────────────────────────
#
# --- a/.github/workflows/render-episodes.yml
# +++ b/.github/workflows/render-episodes.yml
#
# @@ on.schedule:
#    - cron: '30 4 * * 1,3,5'   # existing: pipeline Mon/Wed/Fri 04:30 UTC
#    - cron: '30 4 * * 2,4,6'   # existing: pipeline Tue/Thu/Sat 04:30 UTC
# +  - cron: '0 4 * * 1,3,5'   # NEW: teaser Mon/Wed/Fri 04:00 UTC (30 min earlier)
#
# @@ jobs: (new job added before `pipeline`)
# +  community-teaser:
# +    if: github.event_name == 'schedule' && ...
# +    ...
#
# @@ jobs.pipeline.steps (new step after "Upload to YouTube"):
# +  - name: Post community recap
# +    ...
#
# ─── FULL PATCHED FILE ────────────────────────────────────────────────────────

name: Cartoon Pipeline

on:
  schedule:
    # Mon/Wed/Fri: Render + upload batch 1 (hi, te, ta, en) at 4:30 AM UTC = 10:00 AM IST
    - cron: '30 4 * * 1,3,5'
    # Tue/Thu/Sat: Upload batch 2 (kn, mr, bn) at 4:30 AM UTC
    - cron: '30 4 * * 2,4,6'
    # PATCH (RANK 6): Teaser post 30 min before Mon/Wed/Fri pipeline run
    - cron: '0 4 * * 1,3,5'
  workflow_dispatch:
    inputs:
      episode:
        description: 'Episode number (0 = next unrendered)'
        required: false
        default: '0'
      skip_community_post:
        description: 'Set to true to skip community post steps'
        required: false
        default: 'false'

concurrency:
  group: cartoon-pipeline
  cancel-in-progress: false

# ─── PATCH (RANK 6): Teaser job — runs 30 min before the pipeline job ────────
jobs:
  community-teaser:
    # Only run on the 04:00 UTC schedule trigger, not the 04:30 one
    if: >
      github.event_name == 'schedule' &&
      (startsWith(github.event.schedule, '0 4') || github.event.inputs.skip_community_post == 'false')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Determine next episode number
        id: ep
        run: |
          LAST=$(jq '.lastRendered' config/episode-registry.json)
          echo "episode=$((LAST + 1))" >> $GITHUB_OUTPUT

      - name: Check if teaser already posted (idempotency)
        id: check
        run: |
          EP=${{ steps.ep.outputs.episode }}
          POSTED=$(jq -r --argjson ep "$EP" '.episodes[$ep | tostring].communityTeaserPostedAt // empty' config/episode-registry.json)
          if [ -n "$POSTED" ]; then
            echo "already_posted=true" >> $GITHUB_OUTPUT
            echo "⏭️ Teaser for episode $EP already posted at $POSTED — skipping"
          else
            echo "already_posted=false" >> $GITHUB_OUTPUT
          fi

      - name: Post community teaser
        if: steps.check.outputs.already_posted == 'false'
        env:
          YT_STUDIO_COOKIES: ${{ secrets.YT_STUDIO_COOKIES }}
          YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID_HI }}
        run: |
          npx tsx scripts/post-community.ts \
            --episode ${{ steps.ep.outputs.episode }} \
            --type teaser

      - name: Commit registry (teaser timestamp)
        if: steps.check.outputs.already_posted == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add config/episode-registry.json
          git diff --cached --quiet || git commit -m "chore: community teaser ep ${{ steps.ep.outputs.episode }}"
          git push || (git pull --rebase origin main && git push)

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: community-teaser-failure-screenshot
          path: community-post-auth-failure.png
          if-no-files-found: ignore

  # ─── Existing pipeline job (patch: add recap step + cookie secret) ──────────
  pipeline:
    # Only run on the 04:30 UTC schedules, not the 04:00 teaser trigger
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.schedule, '30 4')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq "ffmpeg=7:*" fonts-dejavu fonts-noto || true
          pip3 install --quiet edge-tts

      - name: Install Rhubarb
        run: |
          wget -q https://github.com/DanielSWolf/rhubarb-lip-sync/releases/download/v1.13.0/Rhubarb-Lip-Sync-1.13.0-Linux.zip
          unzip -q Rhubarb-Lip-Sync-1.13.0-Linux.zip -d /opt/rhubarb
          echo "/opt/rhubarb" >> $GITHUB_PATH

      # PATCH: install Playwright for community post step
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Determine what to do
        id: plan
        run: |
          DAY=$(date -u +%u)
          LAST_RENDERED=$(jq '.lastRendered' config/episode-registry.json)
          NEXT_EP=$((LAST_RENDERED + 1))

          INPUT_EP="${{ github.event.inputs.episode || '0' }}"
          if [ "$INPUT_EP" != "0" ]; then
            NEXT_EP="$INPUT_EP"
          fi

          if [ "$DAY" = "1" ] || [ "$DAY" = "3" ] || [ "$DAY" = "5" ] || [ "$INPUT_EP" != "0" ]; then
            echo "render=true" >> $GITHUB_OUTPUT
            echo "upload_langs=hi,te,ta,en" >> $GITHUB_OUTPUT
          else
            echo "render=false" >> $GITHUB_OUTPUT
            echo "upload_langs=kn,mr,bn" >> $GITHUB_OUTPUT
          fi

          echo "episode=$NEXT_EP" >> $GITHUB_OUTPUT

      - name: Render episode
        if: steps.plan.outputs.render == 'true'
        run: npx tsx scripts/batch-render.ts --limit 1
        timeout-minutes: 60

      - name: Upload to YouTube
        id: upload
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_HI: ${{ secrets.YOUTUBE_REFRESH_TOKEN_HI }}
          YOUTUBE_REFRESH_TOKEN_TE: ${{ secrets.YOUTUBE_REFRESH_TOKEN_TE }}
          YOUTUBE_REFRESH_TOKEN_TA: ${{ secrets.YOUTUBE_REFRESH_TOKEN_TA }}
          YOUTUBE_REFRESH_TOKEN_KN: ${{ secrets.YOUTUBE_REFRESH_TOKEN_KN }}
          YOUTUBE_REFRESH_TOKEN_MR: ${{ secrets.YOUTUBE_REFRESH_TOKEN_MR }}
          YOUTUBE_REFRESH_TOKEN_BN: ${{ secrets.YOUTUBE_REFRESH_TOKEN_BN }}
          YOUTUBE_REFRESH_TOKEN_EN: ${{ secrets.YOUTUBE_REFRESH_TOKEN_EN }}
        run: |
          npx tsx scripts/upload-youtube.ts ${{ steps.plan.outputs.episode }}
          # Extract primary (Hindi) video ID for community recap
          VIDEO_ID=$(jq -r --argjson ep "${{ steps.plan.outputs.episode }}" \
            '.episodes[$ep | tostring].languages.hi.videoId // empty' \
            config/episode-registry.json)
          echo "video_id=$VIDEO_ID" >> $GITHUB_OUTPUT

      # PATCH (RANK 6): Community recap — posted ~1 hour after the video is live
      - name: Post community recap
        if: >
          steps.upload.outputs.video_id != '' &&
          github.event.inputs.skip_community_post != 'true'
        env:
          YT_STUDIO_COOKIES: ${{ secrets.YT_STUDIO_COOKIES }}
          YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID_HI }}
        run: |
          # Wait ~1 hour for YouTube to process the video and notify subscribers first
          echo "⏳ Waiting 60 minutes before posting recap (subscriber notification priming)…"
          sleep 3600
          npx tsx scripts/post-community.ts \
            --episode ${{ steps.plan.outputs.episode }} \
            --type recap \
            --video-id ${{ steps.upload.outputs.video_id }}

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: community-recap-failure-screenshot
          path: community-post-auth-failure.png
          if-no-files-found: ignore

      - name: Commit registry
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add config/episode-registry.json config/publish-queue.json
          git diff --cached --quiet || git commit -m "chore: pipeline ep ${{ steps.plan.outputs.episode }}"
          git push || (git pull --rebase origin main && git push)

      - name: Cleanup old output
        if: always()
        run: rm -rf output/
