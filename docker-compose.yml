version: '3.8'
services:
  kokoro-tts:
    image: remsky/kokoro-fastapi:latest
    container_name: kokoro-tts
    ports:
      - "8880:8880"
    environment:
      - KOKORO_VOICE=af
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
    volumes:
      - ./n8n-data:/home/node/.n8n
    restart: unless-stopped
